name: Update Dribl ICS

on:
  schedule:
    # Daily at 17:00 UTC = 03:00 Melbourne (AEST) / 04:00 (AEDT) — off-peak.
    - cron: "0 17 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "src/**"
      - "config.json"
      - ".github/workflows/update.yml"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"

permissions:
  contents: write

concurrency:
  # Only one update at a time. Newer triggers cancel older queued/running ones,
  # so a manual workflow_dispatch + an automatic push-trigger don't race.
  group: update-ics
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build TypeScript
        run: npm run build

      - name: Generate calendar
        id: generate
        run: node dist/scrape.js
        env:
          DEBUG_DRIBL: ${{ vars.DEBUG_DRIBL || '' }}

      - name: Upload diagnostic artefacts
        if: always() && (failure() || vars.DEBUG_DRIBL == '1')
        uses: actions/upload-artifact@v4
        with:
          name: dribl-captures-${{ github.run_id }}
          path: |
            captures/
          if-no-files-found: ignore
          retention-days: 7

      - name: Update last-updated stamp
        run: |
          stamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          sed -i "s|<span id=\"last-updated\">[^<]*</span>|<span id=\"last-updated\">${stamp}</span>|" docs/index.html

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh fixtures (${{ github.run_id }})"
          file_pattern: "docs/team.ics docs/index.html"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
